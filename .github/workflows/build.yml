name: Build Executables

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            python-version: '3.14'
            executable-name: cisco_gen
            artifact-name: cisco_gen-linux
          - os: windows-latest
            python-version: '3.14'
            executable-name: cisco_gen.exe
            artifact-name: cisco_gen-windows.exe
          - os: macos-latest
            python-version: '3.14'
            executable-name: cisco_gen
            artifact-name: cisco_gen-macos

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
        continue-on-error: true

      - name: Install from pyproject.toml
        run: |
          pip install -e .

      - name: Run build.py
        run: |
          python build.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: dist/${{ matrix.executable-name }}
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            artifacts/cisco_gen-linux/cisco_gen
            artifacts/cisco_gen-windows.exe/cisco_gen.exe
            artifacts/cisco_gen-macos/cisco_gen
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
