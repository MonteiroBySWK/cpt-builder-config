configure terminal
hostname REITORIA
ip domain-name uema.br
username admin secret adminssh
enable secret root
service password-encryption
ip name-server 172.16.1.162
ip dhcp excluded-address 172.16.1.67
ip dhcp excluded-address 172.16.1.65
ip dhcp excluded-address 172.16.1.66
ip dhcp pool POOL_REITORIA_172_16_1_64
 network 172.16.1.64 255.255.255.224
 default-router 172.16.1.67
 dns-server 172.16.1.162
 domain-name uema.br
!
interface GigabitEthernet0/0
 ip address 172.16.1.67 255.255.255.224
 no shutdown
interface Serial0/1/0
 description REITORIA-NTI
 ip address 172.16.1.241 255.255.255.252
 no shutdown
interface Serial0/1/1
 description REITORIA-CCT
 ip address 172.16.1.245 255.255.255.252
 no shutdown
crypto key generate rsa modulus 1024
ip route 172.16.1.224 255.255.255.240 172.16.1.246
ip route 172.16.1.96 255.255.255.224 172.16.1.242
ip route 172.16.1.128 255.255.255.224 172.16.1.242
ip route 172.16.1.160 255.255.255.224 172.16.1.242
ip route 172.16.1.192 255.255.255.224 172.16.1.242
line vty 0 4
 login local
 transport input ssh
end
!