configure terminal
hostname SW2_NTI
ip domain-name uema.br
username admin secret adminssh
enable secret root
vlan 10
 name VLAN10
vlan 20
 name VLAN20
vlan 30
 name VLAN30
vlan 99
 name VLAN99
crypto key generate rsa modulus 1024
interface GigabitEthernet0/1
 description trunk to NTI
 switchport trunk encapsulation dot1q
 switchport mode trunk
 switchport trunk native vlan 99
 switchport trunk allowed vlan 10,20,30,99
 no shutdown
line vty 0 4
 login local
 transport input ssh
end
!