configure terminal
hostname NTI
ip domain-name uema.br
username admin secret adminssh
enable secret root
service password-encryption
interface GigabitEthernet0/0
 ip address 172.16.1.99 255.255.255.224
 no shutdown
interface GigabitEthernet0/1
 ip address 172.16.1.131 255.255.255.224
 no shutdown
interface GigabitEthernet0/2
 ip address 172.16.1.163 255.255.255.224
 no shutdown
interface GigabitEthernet0/3
 ip address 172.16.1.194 255.255.255.224
 no shutdown
interface Serial0/0/0
 description REITORIA-NTI
 ip address 172.16.1.242 255.255.255.252
 no shutdown
interface Serial0/0/2
 description NTI-CCT
 ip address 172.16.1.249 255.255.255.252
 no shutdown
ip route 0.0.0.0 0.0.0.0 90.90.90.2
ip route 172.16.1.64 255.255.255.224 172.16.1.241
ip route 172.16.1.224 255.255.255.240 172.16.1.250
line vty 0 4
 login local
 transport input ssh
end
!