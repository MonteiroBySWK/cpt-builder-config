configure terminal
hostname NTI
ip domain-name uema.br
username admin secret adminssh
enable secret root
service password-encryption
ip name-server 172.16.1.162
ip dhcp excluded-address 172.16.1.99
ip dhcp excluded-address 172.16.1.97
ip dhcp excluded-address 172.16.1.98
ip dhcp pool POOL_NTI_172_16_1_96
 network 172.16.1.96 255.255.255.224
 default-router 172.16.1.99
 dns-server 172.16.1.162
 domain-name uema.br
!
ip dhcp excluded-address 172.16.1.131
ip dhcp excluded-address 172.16.1.129
ip dhcp excluded-address 172.16.1.130
ip dhcp pool POOL_NTI_172_16_1_128
 network 172.16.1.128 255.255.255.224
 default-router 172.16.1.131
 dns-server 172.16.1.162
 domain-name uema.br
!
ip dhcp excluded-address 172.16.1.163
ip dhcp excluded-address 172.16.1.161
ip dhcp excluded-address 172.16.1.162
ip dhcp pool POOL_NTI_172_16_1_160
 network 172.16.1.160 255.255.255.224
 default-router 172.16.1.163
 dns-server 172.16.1.162
 domain-name uema.br
!
ip dhcp excluded-address 172.16.1.194
ip dhcp pool POOL_NTI_172_16_1_192
 network 172.16.1.192 255.255.255.224
 default-router 172.16.1.194
 dns-server 172.16.1.162
 domain-name uema.br
!
interface GigabitEthernet0/0.10
 encapsulation dot1Q 10
 ip address 172.16.1.99 255.255.255.224
 no shutdown
interface GigabitEthernet0/0.20
 encapsulation dot1Q 20
 ip address 172.16.1.131 255.255.255.224
 no shutdown
interface GigabitEthernet0/0.30
 encapsulation dot1Q 30
 ip address 172.16.1.163 255.255.255.224
 no shutdown
interface GigabitEthernet0/0.99
 encapsulation dot1Q 99
 ip address 172.16.1.194 255.255.255.224
 no shutdown
interface Serial0/1/0
 description REITORIA-NTI
 ip address 172.16.1.242 255.255.255.252
 no shutdown
interface Serial0/1/1
 description NTI-CCT
 ip address 172.16.1.249 255.255.255.252
 no shutdown
interface Serial0/1/2
 description INTERNET
 ip address 90.90.90.1 255.255.255.252
 no shutdown
crypto key generate rsa modulus 1024
ip route 0.0.0.0 0.0.0.0 90.90.90.2
ip route 172.16.1.64 255.255.255.224 172.16.1.241
ip route 172.16.1.224 255.255.255.240 172.16.1.250
line vty 0 4
 login local
 transport input ssh
end
!