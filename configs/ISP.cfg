configure terminal
hostname ISP
ip domain-name uema.br
username admin secret adminssh
enable secret root
service password-encryption
ip name-server 172.16.1.162
ip dhcp excluded-address 8.8.8.1
ip dhcp pool POOL_ISP_8_8_8_0
 network 8.8.8.0 255.255.255.0
 default-router 8.8.8.1
 dns-server 172.16.1.162
 domain-name uema.br
!
interface GigabitEthernet0/0
 ip address 8.8.8.1 255.255.255.0
 no shutdown
interface Serial0/1/0
 description INTERNET
 ip address 90.90.90.2 255.255.255.252
 no shutdown
crypto key generate rsa modulus 1024
ip route 172.16.1.64 255.255.255.224 90.90.90.1
ip route 172.16.1.224 255.255.255.240 90.90.90.1
ip route 172.16.1.96 255.255.255.224 90.90.90.1
ip route 172.16.1.128 255.255.255.224 90.90.90.1
ip route 172.16.1.160 255.255.255.224 90.90.90.1
ip route 172.16.1.192 255.255.255.224 90.90.90.1
line vty 0 4
 login local
 transport input ssh
end
!