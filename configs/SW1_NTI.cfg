configure terminal
hostname SW1_NTI
ip domain-name uema.br
username admin secret adminssh
enable secret root
vlan 10
 name VLAN10
vlan 20
 name VLAN20
vlan 30
 name VLAN30
vlan 99
 name VLAN99
crypto key generate rsa modulus 1024
interface Vlan99
 ip address 172.16.1.193 255.255.255.224
 no shutdown
ip default-gateway 172.16.1.194
interface FastEthernet0/1
 description host HOST 5
 switchport access vlan 10
 no shutdown
interface FastEthernet0/2
 description host HOST 6
 switchport access vlan 10
 no shutdown
interface FastEthernet0/3
 description host HOST 7
 switchport access vlan 20
 no shutdown
interface FastEthernet0/4
 description host HOST 8
 switchport access vlan 20
 no shutdown
interface FastEthernet0/5
 description host SERVERWEB
 switchport access vlan 30
 no shutdown
interface FastEthernet0/6
 description host SERVERDNS
 switchport access vlan 30
 no shutdown
interface GigabitEthernet0/1
 description trunk to NTI
 switchport trunk encapsulation dot1q
 switchport mode trunk
 switchport trunk native vlan 99
 switchport trunk allowed vlan 10,20,30,99
 no shutdown
line vty 0 4
 login local
 transport input ssh
end
!